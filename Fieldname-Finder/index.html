---
layout: default
title: Fieldname-Finder
css: /Fieldname-Finder/style.css
---

<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module" src="{{ '/Fieldname-Finder/main.js' | relative_url }}"></script>

<div class="fieldname-finder">
  <header class="ff-head">
    <h1>Fieldname-Finder</h1>
    <span id="status" class="pill idle">
      <span class="dot" aria-hidden="true"></span>
      <span>bereit</span>
    </span>
  </header>

  <section class="card">
    <div class="card-hd">
      <strong>JSON analysieren</strong>
    </div>
    <div class="card-ct">
      <div class="ff-grid">
        <label class="ff-upload" for="jsonFile">
          <span class="material-icons" aria-hidden="true">upload_file</span>
          <span>JSON-Datei wählen</span>
        </label>
        <input type="file" id="jsonFile" accept=".json,application/json">

        <div id="fileInfo" class="ff-file">Keine Datei ausgewählt</div>

        <div class="ff-actions">
          <button id="convertBtn" type="button" class="primary" disabled>
            <span class="material-icons" aria-hidden="true">table_view</span>
            Anzeigen
          </button>
          <button id="downloadBtn" type="button" disabled>
            <span class="material-icons" aria-hidden="true">download</span>
            Excel
          </button>
        </div>
      </div>

      <div id="errorMessage" class="ff-error" role="alert"></div>
    </div>
  </section>

  <section id="tableContainer" class="card ff-results" hidden>
    <div class="card-hd">
      <strong>Gefundene Felder</strong>
      <span class="pill">
        <span class="dot" aria-hidden="true"></span>
        <span id="fieldCount">0</span>
      </span>
    </div>
    <div class="card-ct">
      <div class="ff-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Feldname</th>
              <th>Datentyp</th>
              <th>Vorkommen</th>
              <th>Beispiel</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>
