name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write KG runtime config
        env:
          DZT_LICENSEKEY: ${{ secrets.DZT_LICENSEKEY }}
        run: |
          node -e "const fs = require('fs'); const key = process.env.DZT_LICENSEKEY || ''; fs.writeFileSync('KG-Finder/config.js', 'window.SATOURN_DZT_LICENSEKEY = ' + JSON.stringify(key) + ';\\n');"

      - name: Set up Node for frontend preview
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build frontend preview
        run: |
          npm install --prefix frontend
          npm run --prefix frontend build
          rm -rf frontend-preview
          mkdir -p frontend-preview
          cp -R frontend/dist/. frontend-preview/

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
