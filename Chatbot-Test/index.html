---
layout: default
title: Chatbot-Test
css: /Chatbot-Test/style.css
js: /Chatbot-Test/main.js
module: true
---

<div class="chat-test">
  <section id="chatWidget" class="chat-card" aria-label="Chatbot-Test">
    <header class="chat-card-hd">
      <div class="chat-title">
        <span class="chat-badge">i</span>
        <span>
          <strong>Sachsen</strong>
          <small>Land von Welt</small>
        </span>
      </div>

      <button id="toggleChat" type="button" class="chat-icon-btn" title="Ein- oder ausklappen" aria-label="Ein- oder ausklappen">
        <span class="material-icons" aria-hidden="true">unfold_less</span>
      </button>
    </header>

    <div id="chatBody" class="chat-body" aria-live="polite">
      <div class="msg msg-bot">
        <strong>Hi</strong>
        <span>Wie können wir dir helfen?</span>
      </div>
    </div>

    <form id="chatForm" class="chat-form" autocomplete="off">
      <input id="chatInput" type="text" placeholder="Nachricht schreiben..." autocomplete="off">
      <button id="sendBtn" type="submit" class="primary">
        <span class="material-icons" aria-hidden="true">send</span>
        Senden
      </button>
    </form>
  </section>
</div>
